<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mon Site Resell</title>
  <style>
    :root {
      --blue-main: #007782;
      --blue-light: #e8f4f8;
      --blue-mid: #3dbdca;
      --blue-soft: #c2e7ed;
      --white: #ffffff;
      --text-dark: #1a2e35;
      --text-mid: #4a7078;
      --border: #cde8ed;
      --shadow: 0 2px 12px rgba(0,119,130,0.10);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--blue-light);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--white);
      border-bottom: 2px solid var(--blue-soft);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--blue-main);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--blue-mid); }

    nav { display: flex; gap: 8px; }
    nav button {
      background: none;
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-mid);
      transition: background 0.18s, color 0.18s;
    }
    nav button:hover, nav button.active {
      background: var(--blue-main);
      color: var(--white);
    }

    /* ── MAIN ── */
    main { max-width: 1100px; margin: 0 auto; padding: 32px 16px 60px; }

    .page { display: none; }
    .page.active { display: block; }

    /* ── PAGE TITLES ── */
    .page-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--blue-main);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--blue-soft);
    }

    /* ════════════════════════════════
       PAGE LINKS
    ════════════════════════════════ */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .category-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .category-header {
      background: var(--blue-main);
      color: var(--white);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      user-select: none;
    }
    .category-header .icon { font-size: 1.1rem; }
    .category-header .toggle { font-size: 1rem; transition: transform 0.2s; }
    .category-header.open .toggle { transform: rotate(180deg); }

    .category-body { padding: 12px; }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--blue-light);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 8px;
      border: 1px solid var(--blue-soft);
    }
    .link-item a {
      color: var(--blue-main);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .link-item a:hover { text-decoration: underline; }
    .link-item .btn-del {
      background: none;
      border: none;
      color: #e05;
      cursor: pointer;
      font-size: 1rem;
      margin-left: 8px;
      padding: 2px 6px;
      border-radius: 6px;
    }
    .link-item .btn-del:hover { background: #ffeef2; }

    .add-link-form {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .add-link-form input {
      flex: 1;
      padding: 7px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.88rem;
      outline: none;
      background: var(--white);
    }
    .add-link-form input:focus { border-color: var(--blue-mid); }
    .add-link-form button {
      background: var(--blue-main);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .add-link-form button:hover { background: var(--blue-mid); }

    /* ════════════════════════════════
       PAGE AGENTS
    ════════════════════════════════ */
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .agent-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .agent-avatar {
      width: 48px; height: 48px;
      background: var(--blue-main);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      color: white;
    }
    .agent-name { font-size: 1.05rem; font-weight: 700; color: var(--text-dark); }
    .agent-link a {
      color: var(--blue-main);
      font-size: 0.88rem;
      word-break: break-all;
      text-decoration: none;
    }
    .agent-link a:hover { text-decoration: underline; }
    .btn-del-agent {
      align-self: flex-end;
      background: none;
      border: 1px solid #e0e7ef;
      color: #e05;
      cursor: pointer;
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 0.85rem;
    }
    .btn-del-agent:hover { background: #ffeef2; }

    .add-agent-form {
      background: var(--white);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      max-width: 600px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 180px; }
    .form-group label { font-size: 0.82rem; font-weight: 700; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input {
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.92rem;
      outline: none;
    }
    .form-group input:focus { border-color: var(--blue-mid); }
    .btn-add {
      background: var(--blue-main);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.95rem;
      white-space: nowrap;
    }
    .btn-add:hover { background: var(--blue-mid); }

    /* ════════════════════════════════
       PAGE BEST-SELLERS
    ════════════════════════════════ */
    .bs-table-wrap {
      background: var(--white);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      overflow: auto;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    thead tr {
      background: var(--blue-main);
      color: var(--white);
    }
    thead th {
      padding: 13px 14px;
      text-align: left;
      font-weight: 700;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--blue-light); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--blue-light); }
    tbody td {
      padding: 11px 14px;
      vertical-align: middle;
    }

    td a { color: var(--blue-main); text-decoration: none; font-weight: 600; }
    td a:hover { text-decoration: underline; }

    .qty-control {
      display: flex; align-items: center; gap: 8px;
    }
    .qty-control button {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--blue-mid);
      background: var(--white);
      color: var(--blue-main);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .qty-control button:hover { background: var(--blue-mid); color: white; }
    .qty-val { font-weight: 700; min-width: 22px; text-align: center; }

    .marge-pos { color: #1a9e60; font-weight: 700; }
    .marge-neg { color: #e05; font-weight: 700; }

    tfoot tr { background: var(--blue-light); border-top: 2px solid var(--blue-soft); }
    tfoot td { font-weight: 800; color: var(--blue-main); padding: 12px 14px; }

    .add-bs-form {
      background: var(--white);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }
    .add-bs-form .form-group { min-width: 130px; }
    .add-bs-form .form-group.wide { min-width: 200px; }

    .section-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-mid);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 28px;
      color: var(--text-mid);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Resell<span>Hub</span></div>
  <nav>
    <button class="active" onclick="showPage('links', this)">🔗 Links</button>
    <button onclick="showPage('agents', this)">👤 Agents</button>
    <button onclick="showPage('bestsellers', this)">🔥 Best-Sellers</button>
  </nav>
</header>

<main>

  <!-- ══════════════════════════ PAGE LINKS ══════════════════════════ -->
  <div id="page-links" class="page active">
    <div class="page-title">🔗 Liens par catégorie</div>
    <div class="categories-grid" id="links-grid"></div>
  </div>

  <!-- ══════════════════════════ PAGE AGENTS ══════════════════════════ -->
  <div id="page-agents" class="page">
    <div class="page-title">👤 Mes Agents</div>
    <div class="agents-grid" id="agents-grid"></div>

    <div class="section-label">Ajouter un agent</div>
    <div class="add-agent-form">
      <div class="form-group">
        <label>Nom de l'agent</label>
        <input id="agent-name-input" type="text" placeholder="Ex: Agent Nike">
      </div>
      <div class="form-group wide">
        <label>Lien</label>
        <input id="agent-link-input" type="url" placeholder="https://...">
      </div>
      <button class="btn-add" onclick="addAgent()">+ Ajouter</button>
    </div>
  </div>

  <!-- ══════════════════════════ PAGE BEST-SELLERS ══════════════════════════ -->
  <div id="page-bestsellers" class="page">
    <div class="page-title">🔥 Best-Sellers</div>

    <div class="bs-table-wrap">
      <table id="bs-table">
        <thead>
          <tr>
            <th>Article</th>
            <th>Lien</th>
            <th>Prix achat</th>
            <th>Qté</th>
            <th>Prix revente</th>
            <th>Marge/article</th>
            <th>Total marge</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="bs-tbody"></tbody>
        <tfoot id="bs-tfoot"></tfoot>
      </table>
    </div>

    <div class="section-label">Ajouter un article</div>
    <div class="add-bs-form">
      <div class="form-group wide">
        <label>Nom article</label>
        <input id="bs-name" type="text" placeholder="Ex: Air Force 1 Blanc">
      </div>
      <div class="form-group wide">
        <label>Lien</label>
        <input id="bs-link" type="url" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>Prix achat (€)</label>
        <input id="bs-buy" type="number" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Prix revente (€)</label>
        <input id="bs-sell" type="number" placeholder="0.00" min="0" step="0.01">
      </div>
      <button class="btn-add" onclick="addBSItem()">+ Ajouter</button>
    </div>
  </div>

</main>

<script>
// ═══════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════

const CATEGORIES = [
  { id: "tshirts",      label: "T-Shirts",       icon: "👕" },
  { id: "shorts",       label: "Shorts",          icon: "🩳" },
  { id: "pantalons",    label: "Pantalons",       icon: "👖" },
  { id: "sweats",       label: "Sweats / Hoodies",icon: "🧥" },
  { id: "vestes",       label: "Vestes",          icon: "🥼" },
  { id: "chaussures",   label: "Chaussures",      icon: "👟" },
  { id: "chaussettes",  label: "Chaussettes",     icon: "🧦" },
  { id: "calecons",     label: "Caleçons",        icon: "🩲" },
  { id: "bonnets",      label: "Bonnets",         icon: "🧢" },
  { id: "casquettes",   label: "Casquettes",      icon: "🧢" },
  { id: "sacs",         label: "Sacs",            icon: "👜" },
  { id: "accessoires",  label: "Accessoires",     icon: "⌚" },
  { id: "manteaux",     label: "Manteaux",        icon: "🧣" },
  { id: "robes",        label: "Robes",           icon: "👗" },
];

// ── Persistent state via localStorage ──
function load(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
}
function save(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

let linksData  = load("links_data",  Object.fromEntries(CATEGORIES.map(c => [c.id, []])));
let agentsData = load("agents_data", []);
let bsData     = load("bs_data",     []);

// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════

function showPage(id, btn) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + id).classList.add("active");
  btn.classList.add("active");
}

// ═══════════════════════════════════════════════════════
//  PAGE LINKS
// ═══════════════════════════════════════════════════════

function renderLinks() {
  const grid = document.getElementById("links-grid");
  grid.innerHTML = "";

  CATEGORIES.forEach(cat => {
    const links = linksData[cat.id] || [];
    const card = document.createElement("div");
    card.className = "category-card";

    const header = document.createElement("div");
    header.className = "category-header open";
    header.innerHTML = `<span>${cat.icon} ${cat.label}</span><span class="toggle">▲</span>`;
    header.onclick = () => {
      header.classList.toggle("open");
      body.style.display = header.classList.contains("open") ? "block" : "none";
    };

    const body = document.createElement("div");
    body.className = "category-body";

    if (links.length === 0) {
      body.innerHTML = `<div class="empty">Aucun lien</div>`;
    } else {
      links.forEach((lnk, idx) => {
        const item = document.createElement("div");
        item.className = "link-item";
        const short = lnk.replace(/^https?:\/\//, "").slice(0, 32) + (lnk.length > 40 ? "…" : "");
        item.innerHTML = `<a href="${lnk}" target="_blank" rel="noopener">${short}</a>
          <button class="btn-del" onclick="deleteLink('${cat.id}', ${idx})">✕</button>`;
        body.appendChild(item);
      });
    }

    // Add link form
    const form = document.createElement("div");
    form.className = "add-link-form";
    form.innerHTML = `
      <input type="url" id="input-${cat.id}" placeholder="https://..." />
      <button onclick="addLink('${cat.id}')">+</button>`;
    body.appendChild(form);

    card.appendChild(header);
    card.appendChild(body);
    grid.appendChild(card);
  });
}

function addLink(catId) {
  const input = document.getElementById("input-" + catId);
  const val = input.value.trim();
  if (!val) return;
  if (!linksData[catId]) linksData[catId] = [];
  linksData[catId].push(val);
  save("links_data", linksData);
  input.value = "";
  renderLinks();
}

function deleteLink(catId, idx) {
  linksData[catId].splice(idx, 1);
  save("links_data", linksData);
  renderLinks();
}

// ═══════════════════════════════════════════════════════
//  PAGE AGENTS
// ═══════════════════════════════════════════════════════

function renderAgents() {
  const grid = document.getElementById("agents-grid");
  if (agentsData.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">Aucun agent ajouté</div>`;
    return;
  }
  grid.innerHTML = "";
  agentsData.forEach((ag, idx) => {
    const card = document.createElement("div");
    card.className = "agent-card";
    const initials = ag.name.split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase();
    card.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px">
        <div class="agent-avatar">${initials}</div>
        <div class="agent-name">${ag.name}</div>
      </div>
      <div class="agent-link"><a href="${ag.link}" target="_blank" rel="noopener">${ag.link}</a></div>
      <button class="btn-del-agent" onclick="deleteAgent(${idx})">🗑 Supprimer</button>
    `;
    grid.appendChild(card);
  });
}

function addAgent() {
  const name = document.getElementById("agent-name-input").value.trim();
  const link = document.getElementById("agent-link-input").value.trim();
  if (!name || !link) { alert("Remplis le nom et le lien !"); return; }
  agentsData.push({ name, link });
  save("agents_data", agentsData);
  document.getElementById("agent-name-input").value = "";
  document.getElementById("agent-link-input").value = "";
  renderAgents();
}

function deleteAgent(idx) {
  agentsData.splice(idx, 1);
  save("agents_data", agentsData);
  renderAgents();
}

// ═══════════════════════════════════════════════════════
//  PAGE BEST-SELLERS
// ═══════════════════════════════════════════════════════

function renderBS() {
  const tbody = document.getElementById("bs-tbody");
  const tfoot = document.getElementById("bs-tfoot");

  if (bsData.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty">Aucun article best-seller</td></tr>`;
    tfoot.innerHTML = "";
    return;
  }

  tbody.innerHTML = "";
  let totalAchat = 0, totalRevente = 0, totalMarge = 0;

  bsData.forEach((item, idx) => {
    const qty     = item.qty || 1;
    const buy     = parseFloat(item.buy) || 0;
    const sell    = parseFloat(item.sell) || 0;
    const marge1  = sell - buy;
    const margeT  = marge1 * qty;

    totalAchat   += buy * qty;
    totalRevente += sell * qty;
    totalMarge   += margeT;

    const margeClass = marge1 >= 0 ? "marge-pos" : "marge-neg";
    const margeTClass = margeT >= 0 ? "marge-pos" : "marge-neg";
    const shortLink = item.link ? item.link.replace(/^https?:\/\//, "").slice(0,28) + "…" : "—";

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><strong>${item.name}</strong></td>
      <td>${item.link ? `<a href="${item.link}" target="_blank">${shortLink}</a>` : "—"}</td>
      <td>${buy.toFixed(2)} €</td>
      <td>
        <div class="qty-control">
          <button onclick="changeQty(${idx}, -1)">−</button>
          <span class="qty-val">${qty}</span>
          <button onclick="changeQty(${idx}, 1)">+</button>
        </div>
      </td>
      <td>${sell.toFixed(2)} €</td>
      <td class="${margeClass}">${marge1 >= 0 ? "+" : ""}${marge1.toFixed(2)} €</td>
      <td class="${margeTClass}">${margeT >= 0 ? "+" : ""}${margeT.toFixed(2)} €</td>
      <td><button class="btn-del-agent" onclick="deleteBS(${idx})">✕</button></td>
    `;
    tbody.appendChild(tr);
  });

  tfoot.innerHTML = `
    <tr>
      <td colspan="2">TOTAL</td>
      <td>${totalAchat.toFixed(2)} €</td>
      <td></td>
      <td>${totalRevente.toFixed(2)} €</td>
      <td></td>
      <td class="${totalMarge >= 0 ? 'marge-pos' : 'marge-neg'}">${totalMarge >= 0 ? "+" : ""}${totalMarge.toFixed(2)} €</td>
      <td></td>
    </tr>
  `;
}

function changeQty(idx, delta) {
  bsData[idx].qty = Math.max(1, (bsData[idx].qty || 1) + delta);
  save("bs_data", bsData);
  renderBS();
}

function addBSItem() {
  const name = document.getElementById("bs-name").value.trim();
  const link = document.getElementById("bs-link").value.trim();
  const buy  = parseFloat(document.getElementById("bs-buy").value);
  const sell = parseFloat(document.getElementById("bs-sell").value);

  if (!name) { alert("Donne un nom à l'article !"); return; }
  if (isNaN(buy) || isNaN(sell)) { alert("Entre les prix achat et revente !"); return; }

  bsData.push({ name, link, buy, sell, qty: 1 });
  save("bs_data", bsData);

  document.getElementById("bs-name").value = "";
  document.getElementById("bs-link").value = "";
  document.getElementById("bs-buy").value  = "";
  document.getElementById("bs-sell").value = "";

  renderBS();
}

function deleteBS(idx) {
  bsData.splice(idx, 1);
  save("bs_data", bsData);
  renderBS();
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
renderLinks();
renderAgents();
renderBS();
</script>
</body>
</html>
